spring.application.name=backend

# MSSQL——本機 SQL Server Express 或 Developer
# trustServerCertificate=true:本機開發用的是自簽憑證,必須信任它才能完成加密握手,
# 否則新版 JDBC 驅動預設加密連線,會直接連線失敗。
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pawpostdb;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234

# 啟動時是否整庫重置——拋棄式開發資料庫,由 DatabaseResetter 讀取。
# 想保留手動輸入的測試資料時改成 false,例如 demo 前。
app.db.reset=true

# Init
# schema/data 拆分成多個小檔,依「檔名字母順序」執行,
# 因此以數字前綴控制順序,規則見 init/README.md。
# 注意:這裡刻意「沒有」設定 spring.sql.init.mode——
# 它由 BackendApplication.main 依重置結果動態決定:
# 有重置的空庫才執行 init 腳本;沒重置就跳過,避免對既有資料庫重複建表。
spring.jpa.hibernate.ddl-auto=none

# 教學示範用:打開後主控台會印出每一條 SQL,
# 可觀察貼文列表的 N+1 查詢現象,說明見 PostService.toDto 的註解
#spring.jpa.show-sql=true
spring.sql.init.schema-locations=classpath:init/schema/*.sql
spring.sql.init.data-locations=classpath:init/data/*.sql
spring.sql.init.encoding=UTF-8
